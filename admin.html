<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel DAM</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#111;
            color:white;
        }

        header{
            background:#ff7a00;
            padding:20px;
            text-align:center;
            font-size:28px;
            font-weight:bold;
        }

        .container{
            width:95%;
            max-width:1400px;
            margin:auto;
            padding:30px 0;
        }

        .cards{
            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:20px;
            margin-bottom:30px;
        }

        .card{
            background:#1d1d1d;
            border-radius:12px;
            padding:25px;
        }

        .card h2{
            color:#888;
            font-size:15px;
            margin-bottom:15px;
        }

        .card h1{
            color:#ff7a00;
            font-size:42px;
        }

        .barra{
            display:flex;
            gap:15px;
            margin-bottom:25px;
        }

        input{
            flex:1;
            padding:14px;
            border:none;
            border-radius:8px;
            background:#222;
            color:white;
        }

        button{
            background:#ff7a00;
            color:white;
            border:none;
            padding:14px 25px;
            border-radius:8px;
            cursor:pointer;
            font-weight:bold;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:#1d1d1d;
            border-radius:10px;
            overflow:hidden;
        }

        th{
            background:#ff7a00;
            padding:15px;
        }

        td{
            padding:15px;
            border-bottom:1px solid #2d2d2d;
            text-align:center;
        }

        tr:hover{
            background:#252525;
        }

        .acoes button{
            margin:3px;
        }
    </style>

</head>

<body>

<header>
    Painel Administrativo DAM
</header>

<div class="container">

    <div class="cards">

        <div class="card">
            <h2>Reservas Hoje</h2>
            <h1 id="hoje">0</h1>
        </div>

        <div class="card">
            <h2>Pendentes</h2>
            <h1 id="pendentes">0</h1>
        </div>

        <div class="card">
            <h2>Confirmadas</h2>
            <h1 id="confirmadas">0</h1>
        </div>

        <div class="card">
            <h2>Canceladas</h2>
            <h1 id="canceladas">0</h1>
        </div>

    </div>

    <div class="barra">
        <input
            type="text"
            id="pesquisa"
            placeholder="Pesquisar por nome ou telefone">

        <button onclick="carregarReservas()">
            Atualizar
        </button>
    </div>

    <table>

        <thead>

            <tr>
                <th>Nome</th>
                <th>Telefone</th>
                <th>Data</th>
                <th>Horário</th>
                <th>Pessoas</th>
                <th>Ambiente</th>
                <th>Status</th>
                <th>Ações</th>
            </tr>

        </thead>

        <tbody id="tabelaReservas">

        </tbody>

    </table>

</div>

<script src="supabase.js"></script>

<script>
