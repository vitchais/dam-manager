<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel DAM</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#111;
color:#fff;
}

header{
background:#ff7a00;
padding:20px;
font-size:30px;
font-weight:bold;
text-align:center;
}

.container{
width:95%;
max-width:1400px;
margin:auto;
padding:30px 0;
}

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:#1d1d1d;
padding:25px;
border-radius:12px;
text-align:center;
}

.card h3{
font-size:15px;
color:#999;
margin-bottom:10px;
}

.card h1{
font-size:42px;
color:#ff7a00;
}

.topo{
display:flex;
gap:15px;
margin-bottom:20px;
}

.topo input{
flex:1;
padding:14px;
border:none;
border-radius:8px;
background:#222;
color:#fff;
}

.topo button{
padding:14px 25px;
background:#ff7a00;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
color:#fff;
}

table{
width:100%;
border-collapse:collapse;
background:#1d1d1d;
overflow:hidden;
border-radius:10px;
}

thead{
background:#ff7a00;
}

th{
padding:15px;
}

td{
padding:15px;
text-align:center;
border-bottom:1px solid #2a2a2a;
}

tr:hover{
background:#252525;
}

button.ver{
background:#ff7a00;
padding:8px 14px;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
}

.modal{
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.75);
justify-content:center;
align-items:center;
}

.modal-content{
width:500px;
max-width:95%;
background:#1d1d1d;
padding:25px;
border-radius:12px;
}

.modal-content h2{
margin-bottom:20px;
}

.modal-content p{
margin-bottom:12px;
}

.modal-content button{
margin-top:15px;
margin-right:10px;
}

</style>

</head>

<body>

<header>
PAINEL ADMINISTRATIVO DAM
</header>

<div class="container">

<div class="cards">

<div class="card">
<h3>Reservas Hoje</h3>
<h1 id="hoje">0</h1>
</div>

<div class="card">
<h3>Pendentes</h3>
<h1 id="pendentes">0</h1>
</div>

<div class="card">
<h3>Confirmadas</h3>
<h1 id="confirmadas">0</h1>
</div>

<div class="card">
<h3>Canceladas</h3>
<h1 id="canceladas">0</h1>
</div>

</div>

<div class="topo">

<input
id="pesquisa"
type="text"
placeholder="Pesquisar reserva...">

<button onclick="carregarReservas()">
Atualizar
</button>

</div>

<table>

<thead>

<tr>

<th>Nome</th>
<th>Telefone</th>
<th>Data</th>
<th>Horário</th>
<th>Pessoas</th>
<th>Ambiente</th>
<th>Status</th>
<th>Ações</th>

</tr>

</thead>

<tbody id="tabelaReservas">

</tbody>

</table>

</div>

<div class="modal" id="modalReserva">

<div class="modal-content">

<h2>Reserva</h2>

<p><strong>Nome:</strong> <span id="mNome"></span></p>

<p><strong>Telefone:</strong> <span id="mTelefone"></span></p>

<p><strong>Data:</strong> <span id="mData"></span></p>

<p><strong>Horário:</strong> <span id="mHorario"></span></p>

<p><strong>Pessoas:</strong> <span id="mPessoas"></span></p>

<p><strong>Ambiente:</strong> <span id="mAmbiente"></span></p>

<p><strong>Observações:</strong> <span id="mObs"></span></p>

<p><strong>Status:</strong> <span id="mStatus"></span></p>

<button id="btnConfirmar">Confirmar</button>

<button id="btnCancelar">Cancelar</button>

<button onclick="fecharModal()">Fechar</button>

</div>

</div>

<script src="supabase.js"></script>
<script src="js/admin.js"></script>

</body>
</html>
